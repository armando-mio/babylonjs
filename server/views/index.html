<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #09090b;
      --bg-card: #18181b;
      --bg-card-hover: #1f1f23;
      --border: #27272a;
      --border-light: #3f3f46;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent-blue: #3b82f6;
      --accent-green: #22c55e;
      --accent-purple: #a855f7;
      --accent-red: #ef4444;
      --accent-amber: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .top-bar {
      background: linear-gradient(180deg, rgba(24,24,27,0.95) 0%, rgba(9,9,11,0.95) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-bar-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .logo h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .logo p {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 1px;
    }
    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-green);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status-text {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
    }
    .refresh-btn {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-btn:hover {
      background: var(--bg-card);
      border-color: var(--border-light);
      color: var(--text-primary);
    }

    /* ===== STATS BAR ===== */
    .stats-bar {
      max-width: 1400px;
      margin: 24px auto 0;
      padding: 0 32px;
      display: flex;
      gap: 16px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stat-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stat-icon.blue { background: rgba(59, 130, 246, 0.12); color: var(--accent-blue); }
    .stat-icon.green { background: rgba(34, 197, 94, 0.12); color: var(--accent-green); }
    .stat-icon.purple { background: rgba(168, 85, 247, 0.12); color: var(--accent-purple); }
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .stat-label {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      margin-top: 2px;
    }

    /* ===== GRID ===== */
    .content {
      max-width: 1400px;
      margin: 24px auto;
      padding: 0 32px 48px;
    }
    .section-container {
      margin-bottom: 40px;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }
    .model-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.25s;
    }
    .model-card:hover {
      border-color: var(--border-light);
      background: var(--bg-card-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .card-header {
      padding: 20px 20px 14px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-icon.scan { background: rgba(59, 130, 246, 0.12); color: var(--accent-blue); }
    .card-icon.imported { background: rgba(168, 85, 247, 0.12); color: var(--accent-purple); }
    .card-icon.hardcoded { background: rgba(245, 158, 11, 0.12); color: var(--accent-amber); }
    .card-info {
      flex: 1;
      min-width: 0;
    }
    .card-name {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .meta-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .meta-badge.scan {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
      border: 1px solid rgba(59, 130, 246, 0.25);
    }
    .meta-badge.imported {
      background: rgba(168, 85, 247, 0.15);
      color: var(--accent-purple);
      border: 1px solid rgba(168, 85, 247, 0.25);
    }
    .meta-badge.hardcoded {
      background: rgba(245, 158, 11, 0.15);
      color: var(--accent-amber);
      border: 1px solid rgba(245, 158, 11, 0.25);
    }
    .meta-text {
      font-size: 12px;
      color: var(--text-muted);
    }
    .card-details {
      padding: 0 20px 14px;
      display: flex;
      gap: 16px;
    }
    .detail-item {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-muted);
    }
    .detail-text {
      font-size: 12px;
    }
    .card-actions {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .action-btn {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
      text-decoration: none;
      text-align: center;
    }
    .btn-download {
      background: rgba(59, 130, 246, 0.1);
      color: var(--accent-blue);
      border-color: rgba(59, 130, 246, 0.25);
    }
    .btn-download:hover {
      background: rgba(59, 130, 246, 0.2);
      border-color: rgba(59, 130, 246, 0.4);
    }
    .btn-viewer {
      background: rgba(34, 197, 94, 0.1);
      color: var(--accent-green);
      border-color: rgba(34, 197, 94, 0.25);
    }
    .btn-viewer:hover {
      background: rgba(34, 197, 94, 0.2);
      border-color: rgba(34, 197, 94, 0.4);
    }
    .btn-delete {
      background: transparent;
      color: var(--text-muted);
      border-color: transparent;
      flex: 0;
      padding: 10px 12px;
    }
    .btn-delete:hover {
      background: rgba(239, 68, 68, 0.1);
      color: var(--accent-red);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 80px 32px;
    }
    .empty-icon {
      color: var(--text-muted);
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
    }
    .empty-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .empty-desc {
      color: var(--text-muted);
      font-size: 14px;
      max-width: 360px;
      margin: 0 auto;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <svg style="display:none;">
    <defs>
      <g id="icon-cube"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline fill="none" stroke="currentColor" stroke-width="2" points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line fill="none" stroke="currentColor" stroke-width="2" x1="12" y1="22.08" x2="12" y2="12"></line></g>
      <g id="icon-home"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" points="9 22 9 12 15 12 15 22"></polyline></g>
      <g id="icon-folder"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></g>
      <g id="icon-globe"><circle fill="none" stroke="currentColor" stroke-width="2" cx="12" cy="12" r="10"></circle><line fill="none" stroke="currentColor" stroke-width="2" x1="2" y1="12" x2="22" y2="12"></line><path fill="none" stroke="currentColor" stroke-width="2" d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></g>
      <g id="icon-disk"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" points="17 21 17 13 7 13 7 21"></polyline><polyline fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" points="7 3 7 8 15 8"></polyline></g>
      <g id="icon-file"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" points="13 2 13 9 20 9"></polyline></g>
      <g id="icon-download"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" points="7 10 12 15 17 10"></polyline><line fill="none" stroke="currentColor" stroke-width="2" x1="12" y1="15" x2="12" y2="3"></line></g>
      <g id="icon-eye"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle fill="none" stroke="currentColor" stroke-width="2" cx="12" cy="12" r="3"></circle></g>
      <g id="icon-trash"><polyline fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" points="3 6 5 6 21 6"></polyline><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></g>
      <g id="icon-refresh"><polyline fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" points="23 4 23 10 17 10"></polyline><polyline fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" points="1 20 1 14 7 14"></polyline><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></g>
      <g id="icon-inbox"><polyline fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></g>
    </defs>
  </svg>

  <div class="top-bar">
    <div class="top-bar-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24"><use href="#icon-cube"></use></svg>
        </div>
        <div>
          <h1>3D Model Hub</h1>
          <p>Archivio modelli suddiviso per utente</p>
        </div>
      </div>
      <div class="header-actions">
        <div class="status-dot"></div>
        <span class="status-text">Auto-sync</span>
        <button class="refresh-btn" onclick="loadScans()">
          <svg width="14" height="14" viewBox="0 0 24 24"><use href="#icon-refresh"></use></svg> Aggiorna
        </button>
      </div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-icon blue">
        <svg width="24" height="24" viewBox="0 0 24 24"><use href="#icon-cube"></use></svg>
      </div>
      <div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">Modelli Totali</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">
        <svg width="24" height="24" viewBox="0 0 24 24"><use href="#icon-home"></use></svg>
      </div>
      <div>
        <div class="stat-value" id="statScans">—</div>
        <div class="stat-label">Scansioni Utenti</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon purple">
        <svg width="24" height="24" viewBox="0 0 24 24"><use href="#icon-folder"></use></svg>
      </div>
      <div>
        <div class="stat-value" id="statImported">—</div>
        <div class="stat-label">Importati / Globali</div>
      </div>
    </div>
  </div>

  <div id="mainContent" class="content">
    </div>

  <script>
    function formatBytes(bytes) {
      if (!bytes || bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const day = d.getDate();
      const months = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
      const month = months[d.getMonth()];
      const hours = String(d.getHours()).padStart(2, '0');
      const mins = String(d.getMinutes()).padStart(2, '0');
      return `${day} ${month}, ${hours}:${mins}`;
    }

    async function loadScans() {
      try {
        const res = await fetch('/api/scans');
        const data = await res.json();
        const scans = data.scans || [];

        // Stats
        const scanCount = scans.filter(s => s.source === 'scan').length;
        const otherCount = scans.filter(s => s.source !== 'scan').length;
        document.getElementById('statTotal').textContent = scans.length;
        document.getElementById('statScans').textContent = scanCount;
        document.getElementById('statImported').textContent = otherCount;

        if (scans.length === 0) {
          document.getElementById('mainContent').innerHTML = `
            <div class="empty-state">
              <div class="empty-icon"><svg width="64" height="64" viewBox="0 0 24 24"><use href="#icon-inbox"></use></svg></div>
              <div class="empty-title">Nessun modello presente</div>
              <div class="empty-desc">Scansiona una stanza, importa un modello dall'app o aggiungine uno alla cartella hardcoded.</div>
            </div>`;
          return;
        }

        // Raggruppa per Utente (deviceId)
        const grouped = {};
        scans.forEach(scan => {
          const key = scan.deviceId === 'HARDCODED' ? 'HARDCODED' : (scan.deviceId || 'SCONOSCIUTO');
          if (!grouped[key]) grouped[key] = [];
          grouped[key].push(scan);
        });

        // Ordina in modo che HARDCODED sia il primo, seguito dagli altri in ordine alfabetico
        const keys = Object.keys(grouped).sort((a, b) => {
          if (a === 'HARDCODED') return -1;
          if (b === 'HARDCODED') return 1;
          return a.localeCompare(b);
        });

        let html = '';
        for (const deviceId of keys) {
          const groupScans = grouped[deviceId];
          const sectionTitle = deviceId === 'HARDCODED' ? 'MODELLI HARDCODED' : `MODELLI ${deviceId}`;

          html += `
            <div class="section-container">
              <div class="section-header">
                <span class="section-title">${sectionTitle} (${groupScans.length})</span>
              </div>
              <div class="grid">
          `;

          for (const scan of groupScans) {
            const glbFile = scan.files.find(f => f.type === 'glb') || scan.files[0];
            const isHardcoded = scan.isHardcoded;
            const isImported = scan.source === 'imported';

            let typeClass = 'scan';
            let typeLabel = 'Scansione';
            let iconId = 'icon-home';

            if (isHardcoded) {
              typeClass = 'hardcoded';
              typeLabel = 'Globali';
              iconId = 'icon-globe';
            } else if (isImported) {
              typeClass = 'imported';
              typeLabel = 'Importato';
              iconId = 'icon-folder';
            }

            const displayName = scan.displayName || (scan.scanName);
            const mainSize = glbFile ? formatBytes(glbFile.size) : '—';
            const fileCount = scan.files.length;
            const dateStr = formatDate(scan.timestamp);

            const downloadUrl = isHardcoded ? `/api/hardcoded/${glbFile.name}` : `/api/scans/${scan.scanName}/${glbFile.name}`;
            const viewerUrl = `/viewer?${isHardcoded ? 'hardcoded=' + glbFile.name : 'scan=' + scan.scanName + '&file=' + glbFile.name}`;
            const deleteFn = isHardcoded ? `deleteHardcoded('${glbFile.name}', '${displayName.replace(/'/g, "\\'")}')` : `deleteScan('${scan.scanName}', '${displayName.replace(/'/g, "\\'")}')`;

            html += `
              <div class="model-card">
                <div class="card-header">
                  <div class="card-icon ${typeClass}"><svg width="24" height="24" viewBox="0 0 24 24"><use href="#${iconId}"></use></svg></div>
                  <div class="card-info">
                    <div class="card-name" title="${displayName}">${displayName}</div>
                    <div class="card-meta">
                      <span class="meta-badge ${typeClass}">${typeLabel}</span>
                      <span class="meta-text">${dateStr}</span>
                    </div>
                  </div>
                </div>
                <div class="card-details">
                  <div class="detail-item"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#icon-disk"></use></svg><span class="detail-text">${mainSize}</span></div>
                  <div class="detail-item"><svg width="14" height="14" viewBox="0 0 24 24"><use href="#icon-file"></use></svg><span class="detail-text">${fileCount} file</span></div>
                </div>
                <div class="card-actions">
                  <a class="action-btn btn-download" href="${downloadUrl}" download>
                    <svg width="14" height="14" viewBox="0 0 24 24"><use href="#icon-download"></use></svg> GLB
                  </a>
                  <a class="action-btn btn-viewer" href="${viewerUrl}" target="_blank">
                    <svg width="14" height="14" viewBox="0 0 24 24"><use href="#icon-eye"></use></svg> Editor
                  </a>
                  <button class="action-btn btn-delete" onclick="${deleteFn}" title="Elimina">
                    <svg width="14" height="14" viewBox="0 0 24 24"><use href="#icon-trash"></use></svg>
                  </button>
                </div>
              </div>
            `;
          }
          html += `</div></div>`;
        }
        document.getElementById('mainContent').innerHTML = html;
      } catch (error) {
        document.getElementById('mainContent').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><svg width="64" height="64" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg></div>
            <div class="empty-title">Errore di connessione</div>
            <div class="empty-desc">${error.message}</div>
          </div>`;
      }
    }

    async function deleteScan(scanName, displayName) {
      if (!confirm('Eliminare il modello "' + displayName + '"?')) return;
      try {
        await fetch('/api/scans/' + scanName, { method: 'DELETE' });
        loadScans();
      } catch (e) {
        alert('Errore durante eliminazione: ' + e.message);
      }
    }

    async function deleteHardcoded(fileName, displayName) {
      if (!confirm('Eliminare il modello globale "' + displayName + '"?')) return;
      try {
        await fetch('/api/hardcoded/' + fileName, { method: 'DELETE' });
        loadScans();
      } catch (e) {
        alert('Errore durante eliminazione: ' + e.message);
      }
    }

    loadScans();
    setInterval(loadScans, 5000);
  </script>
</body>
</html>
