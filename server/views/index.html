<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #09090b;
      --bg-card: #18181b;
      --bg-card-hover: #1f1f23;
      --border: #27272a;
      --border-light: #3f3f46;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent-blue: #3b82f6;
      --accent-green: #22c55e;
      --accent-purple: #a855f7;
      --accent-red: #ef4444;
      --accent-amber: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .top-bar {
      background: linear-gradient(180deg, rgba(24,24,27,0.95) 0%, rgba(9,9,11,0.95) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-bar-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .logo h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .logo p {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 1px;
    }
    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-green);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status-text {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
    }
    .refresh-btn {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-btn:hover {
      background: var(--bg-card);
      border-color: var(--border-light);
      color: var(--text-primary);
    }

    /* ===== STATS BAR ===== */
    .stats-bar {
      max-width: 1400px;
      margin: 24px auto 0;
      padding: 0 32px;
      display: flex;
      gap: 16px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stat-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .stat-icon.blue { background: rgba(59, 130, 246, 0.12); }
    .stat-icon.green { background: rgba(34, 197, 94, 0.12); }
    .stat-icon.purple { background: rgba(168, 85, 247, 0.12); }
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .stat-label {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      margin-top: 2px;
    }

    /* ===== GRID ===== */
    .content {
      max-width: 1400px;
      margin: 24px auto;
      padding: 0 32px 48px;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-secondary);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }
    .model-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.25s;
    }
    .model-card:hover {
      border-color: var(--border-light);
      background: var(--bg-card-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .card-header {
      padding: 20px 20px 14px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .card-icon.scan { background: rgba(59, 130, 246, 0.12); }
    .card-icon.imported { background: rgba(168, 85, 247, 0.12); }
    .card-info {
      flex: 1;
      min-width: 0;
    }
    .card-name {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .meta-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .meta-badge.scan {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-blue);
      border: 1px solid rgba(59, 130, 246, 0.25);
    }
    .meta-badge.imported {
      background: rgba(168, 85, 247, 0.15);
      color: var(--accent-purple);
      border: 1px solid rgba(168, 85, 247, 0.25);
    }
    .meta-text {
      font-size: 12px;
      color: var(--text-muted);
    }
    .card-details {
      padding: 0 20px 14px;
      display: flex;
      gap: 16px;
    }
    .detail-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .detail-icon {
      font-size: 12px;
    }
    .detail-text {
      font-size: 12px;
      color: var(--text-muted);
    }
    .card-actions {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .action-btn {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
      text-decoration: none;
      text-align: center;
    }
    .btn-download {
      background: rgba(59, 130, 246, 0.1);
      color: var(--accent-blue);
      border-color: rgba(59, 130, 246, 0.25);
    }
    .btn-download:hover {
      background: rgba(59, 130, 246, 0.2);
      border-color: rgba(59, 130, 246, 0.4);
    }
    .btn-viewer {
      background: rgba(34, 197, 94, 0.1);
      color: var(--accent-green);
      border-color: rgba(34, 197, 94, 0.25);
    }
    .btn-viewer:hover {
      background: rgba(34, 197, 94, 0.2);
      border-color: rgba(34, 197, 94, 0.4);
    }
    .btn-usdz {
      background: rgba(168, 85, 247, 0.1);
      color: var(--accent-purple);
      border-color: rgba(168, 85, 247, 0.25);
    }
    .btn-usdz:hover {
      background: rgba(168, 85, 247, 0.2);
      border-color: rgba(168, 85, 247, 0.4);
    }
    .btn-usdz.loading {
      opacity: 0.6;
      pointer-events: none;
    }
    .btn-delete {
      background: transparent;
      color: var(--text-muted);
      border-color: transparent;
      flex: 0;
      padding: 10px 12px;
    }
    .btn-delete:hover {
      background: rgba(239, 68, 68, 0.1);
      color: var(--accent-red);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 80px 32px;
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    .empty-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .empty-desc {
      color: var(--text-muted);
      font-size: 14px;
      max-width: 360px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .top-bar { padding: 16px 20px; }
      .stats-bar { padding: 0 20px; flex-direction: column; }
      .content { padding: 0 20px 48px; }
      .grid { grid-template-columns: 1fr; }
      .stat-card { padding: 14px 16px; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-inner">
      <div class="logo">
        <div class="logo-icon">📐</div>
        <div>
          <h1>3D Model Hub</h1>
          <p>Scansioni RoomPlan e modelli importati</p>
        </div>
      </div>
      <div class="header-actions">
        <div class="status-dot"></div>
        <span class="status-text">Auto-sync attivo</span>
        <button class="refresh-btn" onclick="loadScans()">↻ Aggiorna</button>
      </div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-icon blue">📦</div>
      <div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">Modelli Totali</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">🏠</div>
      <div>
        <div class="stat-value" id="statScans">—</div>
        <div class="stat-label">Scansioni</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon purple">📁</div>
      <div>
        <div class="stat-value" id="statImported">—</div>
        <div class="stat-label">Importati</div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="section-header" style="margin-top: 24px;">
      <span class="section-title" id="sectionTitle">Caricamento...</span>
    </div>
    <div id="gridContent" class="grid"></div>
  </div>

  <script>
    function formatBytes(bytes) {
      if (!bytes || bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const day = d.getDate();
      const months = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
      const month = months[d.getMonth()];
      const hours = String(d.getHours()).padStart(2, '0');
      const mins = String(d.getMinutes()).padStart(2, '0');
      return `${day} ${month}, ${hours}:${mins}`;
    }

    async function loadScans() {
      try {
        const res = await fetch('/api/scans');
        const data = await res.json();
        const scans = data.scans || [];

        // Stats
        const scanCount = scans.filter(s => !s.source || s.source !== 'imported').length;
        const importedCount = scans.filter(s => s.source === 'imported').length;
        document.getElementById('statTotal').textContent = scans.length;
        document.getElementById('statScans').textContent = scanCount;
        document.getElementById('statImported').textContent = importedCount;

        if (scans.length === 0) {
          document.getElementById('sectionTitle').textContent = 'Archivio Modelli';
          document.getElementById('gridContent').innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1;">
              <div class="empty-icon">📭</div>
              <div class="empty-title">Nessun modello presente</div>
              <div class="empty-desc">Scansiona una stanza con LiDAR o importa un modello 3D dall'app per iniziare.</div>
            </div>`;
          return;
        }

        document.getElementById('sectionTitle').textContent = 'Archivio Modelli (' + scans.length + ')';

        let html = '';
        for (const scan of scans) {
          const glbFile = scan.files.find(f => f.type === 'glb');
          const usdzFile = scan.files.find(f => f.type === 'usdz');
          const isImported = scan.source === 'imported';
          const icon = isImported ? '📁' : '🏠';
          const typeClass = isImported ? 'imported' : 'scan';
          const typeLabel = isImported ? 'Importato' : 'Scansione';
          const mainFile = glbFile || usdzFile;
          const displayName = scan.displayName || (isImported && mainFile ? mainFile.name : scan.scanName);
          const mainSize = mainFile ? formatBytes(mainFile.size) : '—';
          const fileCount = scan.files.length;
          const dateStr = formatDate(scan.timestamp);

          html += '<div class="model-card">';
          html += '  <div class="card-header">';
          html += '    <div class="card-icon ' + typeClass + '">' + icon + '</div>';
          html += '    <div class="card-info">';
          html += '      <div class="card-name" title="' + displayName + '">' + displayName + '</div>';
          html += '      <div class="card-meta">';
          html += '        <span class="meta-badge ' + typeClass + '">' + typeLabel + '</span>';
          html += '        <span class="meta-text">' + dateStr + '</span>';
          html += '      </div>';
          html += '    </div>';
          html += '  </div>';
          html += '  <div class="card-details">';
          html += '    <div class="detail-item"><span class="detail-icon">💾</span><span class="detail-text">' + mainSize + '</span></div>';
          html += '    <div class="detail-item"><span class="detail-icon">📄</span><span class="detail-text">' + fileCount + ' file</span></div>';
          html += '  </div>';
          html += '  <div class="card-actions">';
          if (glbFile) {
            html += '    <a class="action-btn btn-download" href="/api/scans/' + scan.scanName + '/' + glbFile.name + '" download>⬇ GLB</a>';
            html += '    <a class="action-btn btn-viewer" href="/viewer?scan=' + scan.scanName + '&file=' + glbFile.name + '" target="_blank">👁 Viewer 3D</a>';
          }
          if (usdzFile) {
            html += '    <a class="action-btn btn-usdz" href="/api/scans/' + scan.scanName + '/' + usdzFile.name + '" download>⬇ USDZ</a>';
          } else if (glbFile) {
            html += '    <button class="action-btn btn-usdz" id="usdz-' + scan.scanName + '" onclick="convertToUsdz(\'' + scan.scanName + '\')">🔄 USDZ</button>';
          }
          html += '    <button class="action-btn btn-delete" onclick="deleteScan(\'' + scan.scanName + '\', \'' + displayName.replace(/'/g, "\\'") + '\')" title="Elimina">🗑</button>';
          html += '  </div>';
          html += '</div>';
        }
        document.getElementById('gridContent').innerHTML = html;
      } catch (error) {
        document.getElementById('gridContent').innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;"><div class="empty-icon">⚠️</div><div class="empty-title">Errore di connessione</div><div class="empty-desc">' + error.message + '</div></div>';
      }
    }

    async function deleteScan(scanName, displayName) {
      if (!confirm('Eliminare "' + displayName + '"?')) return;
      try {
        await fetch('/api/scans/' + scanName, { method: 'DELETE' });
        loadScans();
      } catch (e) {
        alert('Errore durante eliminazione: ' + e.message);
      }
    }

    async function convertToUsdz(scanName) {
      var btn = document.getElementById('usdz-' + scanName);
      if (btn) { btn.classList.add('loading'); btn.textContent = '⏳ ...'; }
      try {
        var res = await fetch('/api/scans/' + scanName + '/convert-usdz', { method: 'POST' });
        var data = await res.json();
        if (data.success) {
          loadScans(); // Ricarica per mostrare il link download USDZ
        } else {
          alert('Conversione fallita: ' + data.message);
          if (btn) { btn.classList.remove('loading'); btn.textContent = '🔄 USDZ'; }
        }
      } catch (e) {
        alert('Errore: ' + e.message);
        if (btn) { btn.classList.remove('loading'); btn.textContent = '🔄 USDZ'; }
      }
    }

    async function convertToUsdz(scanName) {
      const btn = document.getElementById('usdz-' + scanName);
      if (!btn) return;
      btn.textContent = '⏳ Conversione...';
      btn.classList.add('loading');
      try {
        const res = await fetch('/api/scans/' + scanName + '/convert-usdz', { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          loadScans(); // Ricarica per mostrare il link di download
        } else {
          alert('Conversione fallita: ' + data.message);
          btn.textContent = '🔄 USDZ';
          btn.classList.remove('loading');
        }
      } catch (e) {
        alert('Errore conversione: ' + e.message);
        btn.textContent = '🔄 USDZ';
        btn.classList.remove('loading');
      }
    }

    loadScans();
    setInterval(loadScans, 5000);
  </script>
</body>
</html>
