<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #09090b;
      --bg-card: #18181b;
      --border: #27272a;
      --border-light: #3f3f46;
      --text: #fafafa;
      --text-sec: #a1a1aa;
      --text-muted: #71717a;
      --blue: #3b82f6;
      --green: #22c55e;
      --purple: #a855f7;
      --red: #ef4444;
      --panel-width: 320px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    header {
      background: var(--bg-card);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      background: transparent;
      color: var(--text-sec);
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-btn:hover { background: var(--bg); border-color: var(--border-light); color: var(--text); }
    h2 { font-size: 16px; font-weight: 700; }
    .toggle-panel-btn {
      background: rgba(168, 85, 247, 0.1);
      color: var(--purple);
      border: 1px solid rgba(168, 85, 247, 0.3);
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .toggle-panel-btn:hover {
      background: rgba(168, 85, 247, 0.2);
    }
    .toggle-panel-btn.active {
      background: var(--purple);
      color: white;
      border-color: var(--purple);
    }

    /* MAIN LAYOUT */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }
    model-viewer {
      flex: 1;
      width: 100%;
      height: 100%;
      outline: none;
      background-color: #111113;
    }

    /* SIDE PANEL */
    .side-panel {
      width: var(--panel-width);
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
      transition: margin-right 0.3s ease;
    }
    .side-panel.hidden {
      margin-right: calc(-1 * var(--panel-width));
    }
    .panel-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* MATERIAL SELECTOR */
    .mat-list { display: flex; flex-direction: column; gap: 6px; }
    .mat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 13px;
      font-weight: 500;
    }
    .mat-item:hover { border-color: var(--border-light); }
    .mat-item.selected { border-color: var(--purple); background: rgba(168, 85, 247, 0.08); }
    .mat-swatch {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .mat-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* COLOR PICKER */
    .color-section { display: flex; flex-direction: column; gap: 12px; }
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .color-input-wrap {
      position: relative;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .color-input-wrap input[type="color"] {
      position: absolute;
      width: 150%;
      height: 150%;
      top: -25%;
      left: -25%;
      border: none;
      cursor: pointer;
    }
    .color-hex {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-family: monospace;
      flex: 1;
      width: 100%;
    }

    /* SLIDERS */
    .slider-group { margin-bottom: 14px; }
    .slider-group:last-child { margin-bottom: 0; }
    .slider-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .slider-name { font-size: 13px; font-weight: 500; }
    .slider-value { font-size: 12px; color: var(--text-muted); font-family: monospace; }
    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--purple);
      cursor: pointer;
      border: 3px solid var(--bg-card);
      box-shadow: 0 0 0 1px rgba(168, 85, 247, 0.3);
    }

    /* PRESETS */
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .preset-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 6px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      color: var(--text);
    }
    .preset-btn:hover { border-color: var(--border-light); transform: translateY(-1px); }
    .preset-btn.active { border-color: var(--purple); background: rgba(168, 85, 247, 0.08); }
    .preset-icon { 
      width: 22px; height: 22px; 
      border-radius: 50%; 
      margin: 0 auto 6px auto;
      border: 1px solid var(--border);
    }
    .preset-name { font-size: 10px; font-weight: 600; color: var(--text-sec); }

    /* RESET */
    .reset-btn {
      width: 100%;
      background: rgba(239, 68, 68, 0.08);
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .reset-btn:hover { background: rgba(239, 68, 68, 0.15); }

    .no-materials {
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }

    @media (max-width: 768px) {
      .side-panel {
        position: absolute;
        right: 0; top: 0; bottom: 0;
        z-index: 50;
        box-shadow: -8px 0 32px rgba(0,0,0,0.5);
      }
      .side-panel.hidden { transform: translateX(100%); margin-right: 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a href="/" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> 
        Dashboard
      </a>
      <h2 id="model-title">Caricamento...</h2>
    </div>
    <button class="toggle-panel-btn" id="toggleBtn" onclick="togglePanel()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r=".5"></circle><circle cx="17.5" cy="10.5" r=".5"></circle><circle cx="8.5" cy="7.5" r=".5"></circle><circle cx="6.5" cy="12.5" r=".5"></circle><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.66 0 3-1.34 3-3 0-.35-.07-.69-.2-.1-.08-.23-.13-.48-.13-.75 0-1.1.9-2 2-2h3c2.21 0 4-1.79 4-4 0-3.86-3.59-7-8-7z"></path></svg> 
      Materiali
    </button>
  </header>

  <div class="main">
    <model-viewer
      id="viewer"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1.2"
      environment-image="neutral"
    ></model-viewer>

    <div class="side-panel hidden" id="panel">
      <div class="panel-section">
        <div class="panel-title">Materiali</div>
        <div class="mat-list" id="matList">
          <div class="no-materials">Caricamento materiali...</div>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">Colore Base</div>
        <div class="color-section">
          <div class="color-row">
            <div class="color-input-wrap">
              <input type="color" id="colorPicker" value="#ffffff" onchange="onColorChange(this.value)">
            </div>
            <input type="text" class="color-hex" id="colorHex" value="#FFFFFF" onchange="onHexInput(this.value)" maxlength="7">
          </div>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">Proprietà PBR</div>
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-name">Metallicità</span>
            <span class="slider-value" id="metalVal">0.0</span>
          </div>
          <input type="range" id="metalSlider" min="0" max="1" step="0.01" value="0" oninput="onMetalChange(this.value)">
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span class="slider-name">Rugosità</span>
            <span class="slider-value" id="roughVal">1.0</span>
          </div>
          <input type="range" id="roughSlider" min="0" max="1" step="0.01" value="1" oninput="onRoughChange(this.value)">
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">Preset Materiali</div>
        <div class="preset-grid" id="presetGrid"></div>
      </div>

      <div class="panel-section">
        <button class="reset-btn" onclick="resetMaterials()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg> 
          Ripristina Originali
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    const viewer = document.getElementById('viewer');
    const params = new URLSearchParams(window.location.search);

    // Carica modello normale o hardcoded
    if (params.get('scan') && params.get('file')) {
      document.getElementById('model-title').textContent = params.get('file');
      viewer.src = '/api/scans/' + params.get('scan') + '/' + params.get('file');
    } else if (params.get('hardcoded')) {
      document.getElementById('model-title').textContent = params.get('hardcoded');
      viewer.src = '/api/hardcoded/' + params.get('hardcoded');
    }

    let selectedMatIndex = 0;
    let originalMaterials = [];

    // Preset materiali 
    const PRESETS = [
      { name: 'Bianco',   color: [1, 1, 1],       metal: 0,   rough: 0.8 },
      { name: 'Nero',     color: [0.05, 0.05, 0.05], metal: 0, rough: 0.7 },
      { name: 'Rosso',    color: [0.85, 0.1, 0.1], metal: 0,   rough: 0.6 },
      { name: 'Oro',      color: [1, 0.84, 0],     metal: 1,   rough: 0.3 },
      { name: 'Chrome',   color: [0.8, 0.8, 0.82], metal: 1,   rough: 0.05 },
      { name: 'Legno',    color: [0.55, 0.35, 0.18], metal: 0, rough: 0.85 },
      { name: 'Pietra',   color: [0.6, 0.58, 0.55], metal: 0,  rough: 0.95 },
      { name: 'Vetro',    color: [0.9, 0.95, 1],   metal: 0,   rough: 0.05 },
      { name: 'Rame',     color: [0.85, 0.5, 0.3], metal: 1,   rough: 0.25 },
    ];

    // Render preset buttons
    const presetGrid = document.getElementById('presetGrid');
    PRESETS.forEach((p, i) => {
      const btn = document.createElement('button');
      btn.className = 'preset-btn';
      const rgbColor = `rgb(${p.color[0]*255},${p.color[1]*255},${p.color[2]*255})`;
      btn.innerHTML = `<div class="preset-icon" style="background-color: ${rgbColor}"></div><div class="preset-name">${p.name}</div>`;
      btn.onclick = () => applyPreset(i);
      presetGrid.appendChild(btn);
    });

    function rgbToHex(r, g, b) {
      const toH = v => Math.round(Math.min(1, Math.max(0, v)) * 255).toString(16).padStart(2, '0');
      return '#' + toH(r) + toH(g) + toH(b);
    }

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16) / 255;
      const g = parseInt(hex.slice(3, 5), 16) / 255;
      const b = parseInt(hex.slice(5, 7), 16) / 255;
      return [r, g, b];
    }

    viewer.addEventListener('load', () => {
      const model = viewer.model;
      if (!model || !model.materials || model.materials.length === 0) {
        document.getElementById('matList').innerHTML = '<div class="no-materials">Nessun materiale trovato</div>';
        return;
      }

      originalMaterials = model.materials.map(mat => {
        const pbr = mat.pbrMetallicRoughness;
        const baseColor = pbr.baseColorFactor;
        return {
          color: [...baseColor],
          metallic: pbr.metallicFactor,
          roughness: pbr.roughnessFactor,
        };
      });

      renderMaterialList();
      selectMaterial(0);
    });

    function renderMaterialList() {
      const model = viewer.model;
      const list = document.getElementById('matList');
      list.innerHTML = '';

      model.materials.forEach((mat, i) => {
        const pbr = mat.pbrMetallicRoughness;
        const c = pbr.baseColorFactor;
        const hex = rgbToHex(c[0], c[1], c[2]);

        const item = document.createElement('div');
        item.className = 'mat-item' + (i === selectedMatIndex ? ' selected' : '');
        item.innerHTML = '<div class="mat-swatch" style="background:' + hex + '"></div><span class="mat-name">' + (mat.name || 'Materiale ' + (i + 1)) + '</span>';
        item.onclick = () => selectMaterial(i);
        list.appendChild(item);
      });
    }

    function selectMaterial(index) {
      selectedMatIndex = index;
      const mat = viewer.model.materials[index];
      const pbr = mat.pbrMetallicRoughness;
      const c = pbr.baseColorFactor;
      const hex = rgbToHex(c[0], c[1], c[2]);

      document.getElementById('colorPicker').value = hex;
      document.getElementById('colorHex').value = hex.toUpperCase();
      document.getElementById('metalSlider').value = pbr.metallicFactor;
      document.getElementById('metalVal').textContent = pbr.metallicFactor.toFixed(2);
      document.getElementById('roughSlider').value = pbr.roughnessFactor;
      document.getElementById('roughVal').textContent = pbr.roughnessFactor.toFixed(2);

      renderMaterialList();
    }

    window.onColorChange = function(hex) {
      const [r, g, b] = hexToRgb(hex);
      const mat = viewer.model.materials[selectedMatIndex];
      const alpha = mat.pbrMetallicRoughness.baseColorFactor[3];
      mat.pbrMetallicRoughness.setBaseColorFactor([r, g, b, alpha]);
      document.getElementById('colorHex').value = hex.toUpperCase();
      renderMaterialList();
    };

    window.onHexInput = function(hex) {
      if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
        document.getElementById('colorPicker').value = hex;
        window.onColorChange(hex);
      }
    };

    window.onMetalChange = function(val) {
      const v = parseFloat(val);
      viewer.model.materials[selectedMatIndex].pbrMetallicRoughness.setMetallicFactor(v);
      document.getElementById('metalVal').textContent = v.toFixed(2);
    };

    window.onRoughChange = function(val) {
      const v = parseFloat(val);
      viewer.model.materials[selectedMatIndex].pbrMetallicRoughness.setRoughnessFactor(v);
      document.getElementById('roughVal').textContent = v.toFixed(2);
    };

    function applyPreset(presetIndex) {
      const p = PRESETS[presetIndex];
      const mat = viewer.model.materials[selectedMatIndex];
      const alpha = mat.pbrMetallicRoughness.baseColorFactor[3];
      mat.pbrMetallicRoughness.setBaseColorFactor([...p.color, alpha]);
      mat.pbrMetallicRoughness.setMetallicFactor(p.metal);
      mat.pbrMetallicRoughness.setRoughnessFactor(p.rough);

      const hex = rgbToHex(p.color[0], p.color[1], p.color[2]);
      document.getElementById('colorPicker').value = hex;
      document.getElementById('colorHex').value = hex.toUpperCase();
      document.getElementById('metalSlider').value = p.metal;
      document.getElementById('metalVal').textContent = p.metal.toFixed(2);
      document.getElementById('roughSlider').value = p.rough;
      document.getElementById('roughVal').textContent = p.rough.toFixed(2);
      renderMaterialList();

      document.querySelectorAll('.preset-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === presetIndex);
      });
    }

    window.resetMaterials = function() {
      const model = viewer.model;
      originalMaterials.forEach((orig, i) => {
        const mat = model.materials[i];
        if (!mat) return;
        mat.pbrMetallicRoughness.setBaseColorFactor(orig.color);
        mat.pbrMetallicRoughness.setMetallicFactor(orig.metallic);
        mat.pbrMetallicRoughness.setRoughnessFactor(orig.roughness);
      });
      selectMaterial(selectedMatIndex);
      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
    };

    window.togglePanel = function() {
      const panel = document.getElementById('panel');
      const btn = document.getElementById('toggleBtn');
      panel.classList.toggle('hidden');
      btn.classList.toggle('active');
    };
  </script>
</body>
</html>
